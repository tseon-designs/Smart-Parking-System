# ── Test Database (In-Memory H2) ─────────────────────────────────────────────
# Use in-memory DB for tests - avoids file locking & seeding issues
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# create-drop creates the schema fresh for each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── H2 Console (disabled in tests) ───────────────────────────────────────────
spring.h2.console.enabled=false

# ── Spring Profile: 'test' prevents DataInitializer from running ─────────────
spring.profiles.active=test

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Reduce noise in test output
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
